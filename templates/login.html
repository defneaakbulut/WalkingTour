{% extends "base.html" %}

{% block title %}Log in — Turkish Delight{% endblock %}

{% block content %}
  <section class="auth-page">
    <div class="auth-image">
      <video autoplay muted loop playsinline preload="metadata" aria-label="İzmir food tour scenes">
        <source src="{{ url_for('static', filename='BoyozDoner.mp4') }}" type="video/mp4">
        Your browser does not support HTML video.
      </video>
    </div>
    <div class="auth-panel">
      <div class="auth-decoration" aria-hidden="true">
        <img src="{{ url_for('static', filename='decoration1.png') }}" alt="">
      </div>
      <h1>Continue your<br><em>journey.</em></h1>
      <form method="post" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>
          Email address
          <input type="email" name="email" required autocomplete="email">
        </label>
        <label>
          Password
          <input type="password" name="password" required autocomplete="current-password">
        </label>
        <label class="check">
          <input type="checkbox" name="remember">
          Keep me signed in
        </label>
        <button class="button button-dark button-full" type="submit">Log in</button>
      </form>
      <p>New to Turkish Delight? <a href="{{ url_for('register') }}">Create an account</a></p>
    </div>
  </section>
{% endblock %}
