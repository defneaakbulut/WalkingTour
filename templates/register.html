{% extends "base.html" %}

{% block title %}Join — Turkish Delight{% endblock %}

{% block content %}
  <section class="auth-page">
    <div class="auth-image">
      <video autoplay muted loop playsinline preload="metadata" aria-label="Turkish tea and food tour scenes">
        <source src="{{ url_for('static', filename='ÇayDöner.mp4') }}" type="video/mp4">
        Your browser does not support HTML video.
      </video>
    </div>
    <div class="auth-panel">
      <div class="auth-decoration" aria-hidden="true">
        <img src="{{ url_for('static', filename='decoration1.png') }}" alt="">
      </div>
      <h1>Create your<br><em>account.</em></h1>
      <form method="post" enctype="multipart/form-data" class="stack-form" data-register>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-row">
          <label>
            First name
            <input name="first_name" required maxlength="80">
          </label>
          <label>
            Last name
            <input name="last_name" required maxlength="80">
          </label>
        </div>
        <label>
          Email address
          <input type="email" name="email" required>
        </label>
        <label>
          Password <small>8 characters minimum</small>
          <input type="password" name="password" minlength="8" required>
        </label>
        <fieldset>
          <legend>I want to</legend>
          <div class="role-options">
            <label>
              <input type="radio" name="role" value="participant" checked>
              <span>Join Tours</span>
            </label>
            <label>
              <input type="radio" name="role" value="guide">
              <span>Lead Tours</span>
            </label>
          </div>
        </fieldset>
        <fieldset class="languages" data-languages hidden>
          <legend>Guide details</legend>
          {% for language in languages %}
            <label><input type="checkbox" name="languages" value="{{ language }}"> {{ language }}</label>
          {% endfor %}
          <label>
            Profile photo <small>optional</small>
            <input type="file" name="profile_photo" accept="image/png,image/jpeg,image/webp">
          </label>
        </fieldset>
        <button class="button button-dark button-full" type="submit">Create account</button>
      </form>
      <p>Already a member? <a href="{{ url_for('login') }}">Log in</a></p>
    </div>
  </section>
{% endblock %}
